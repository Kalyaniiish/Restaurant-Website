<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('ambiance.AVIF');
            background-size: full;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

        }
        .booking-container {
            backgroundrgb(0, 0, 240);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: rgb(67, 67, 129);
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="booking-container"> 
        <h1>Book a Table</h1>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="date" required>
            <input type="time" required>
            <input type="number" placeholder="Number of Guests" required>
            <button type="submit">Book your seats</button>
        </form>
    </div>
    
</body>
</html>
