<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Ambience</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background:  no-repeat center center fixed;
            background-size: cover;
            color:burlywood;
            background-color: burlywood;
        }

        h1 {
            text-align: center;
            margin-top: 40px;
            text-shadow: 2px 2px 6px black;
        }

        .ambience-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 50px;
        }

        .ambience-box {
            width: 450px;
            height: 200px;
            background-size: cover;
            background-position: center;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .ambience1 { background-image: url('ambiance1.JPG'); }
        .ambience2 { background-image: url('amb2.JPG'); }
        .ambience3 { background-image: url('amb3.jpg'); }
        .ambience4 { background-image: url('amb4.jpeg'); }
        .ambience5 { background-image: url('amb5.jpeg'); }
        .ambience6 { background-image: url('amb6.jpg'); }
    </style>
</head>
<body>

    <h1>Our Restaurant Ambience</h1>

    <div class="ambience-container">
        <div class="ambience-box ambience1"></div>
        <div class="ambience-box ambience2"></div>
        <div class="ambience-box ambience3"></div>
        <div class="ambience-box ambience4"></div>
        <div class="ambience-box ambience5"></div>
        <div class="ambience-box ambience6"></div>
    </div>

</body>
</html>
