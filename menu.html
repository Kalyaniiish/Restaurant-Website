<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: url('ambiance.AVIF') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 40px;
            color: white;
            text-shadow: 2px 2px 5px black;
        }

        .container {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin: 60px 0;
            flex-wrap: wrap;
        }

        .box {
            width: 350px;
            height: 250px;
            padding:15%%;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 4px black;
        }

        .starters {
            background-image: url('starter.WEBP');
        }

        .main-course {
            background-image: url('maincourse.WEBP');
        }

        .dessert {
            background-image: url('dessert.JPEG');
        }
    </style>
</head>
<body>

    <h1>Our Menu</h1>

    <div class="container">
        <div class="box starters"><a href="starter.html">Starters</div>
        <div class="box main-course"><a href="maincourse.html">Main Course</div>
        <div class="box dessert"><a href="dessert.html">Dessert</div>
    </div>

</body>
</html>
